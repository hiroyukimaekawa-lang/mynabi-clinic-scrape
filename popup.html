<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mynavi Scraper</title>
    <style>
        body {
            font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
            margin: 14px;
            width: 260px;
        }

        h1 {
            font-size: 15px;
            margin: 0 0 8px;
        }

        p {
            margin: 0 0 12px;
            font-size: 12px;
            line-height: 1.4;
            color: #333;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            cursor: pointer;
            background: #1565c0;
            color: #fff;
        }

        button:hover {
            background: #0f4f99;
        }
    </style>
</head>

<body>
    <h1>Mynavi Clinic Scraper</h1>
    <p>専用画面を開いて、一覧ページから詳細情報を抽出します。</p>
    <button id="open">スクレイパーを開く</button>
    <script src="popup.js"></script>
</body>

</html>
